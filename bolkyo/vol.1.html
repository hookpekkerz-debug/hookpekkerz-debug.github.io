<h1>引き算のボルダリング</h1>

<p>
ボルダリングは自由なスポーツです。
人によって目指すところは様々で王道も邪道もありません。
</p>

<p>
ボルダリングは力くらべではなく、
自重を支える力があれば完登できます。
必要最低限の力があれば十分です。
</p>

<p>
初中級者はリキみ過ぎな人が多いです。
トライ数を重ねてどこで力を抜けるか引き算をします。
</p>

<h2>静かに登る</h2>

<p>
大きな音がなるという事は、
それだけ無駄な力が音エネルギーに変換されているという事です。
</p>

<h2>猫足</h2>

<p>
そろりそろりと音を立てないで足を置くことです。
</p>

<h2>芝生を根っこから抜く</h2>

<p>
ホールドはふかふかの芝生をつかんで
引っこ抜くように持ってください。
</p>
